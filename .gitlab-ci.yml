build-job:
  script:
    - apt-get update
    - apt-get -y install python3 python3-pip python3.11-venv
    - python3 -m venv .
    - bin/python3 -m pip install -U pip pipenv
    - bin/pipenv install ansible
    - bin/pipenv install --dev
    - bin/pipenv run ansible-playbook --syntax-check -i conf/build.yml site.yml
  stage: build

changelog:
  image:
    name: orhunp/git-cliff:latest
    entrypoint: [""]
  variables:
    GIT_STRATEGY: clone # clone entire repo instead of reusing workspace
    GIT_DEPTH: 0 # avoid shallow clone to give cliff all the info it needs
  stage: build
  script:
    - git-cliff -r . > CHANGELOG.md
  artifacts:
    paths:
      - CHANGELOG.md

ansible-lint:
  script:
    - apt-get update
    - apt-get -y install python3 python3-pip python3.11-venv
    - python3 -m venv .
    - bin/python3 -m pip install -U pip pipenv
    - bin/pipenv install ansible-lint ansible
    - bin/pipenv install --dev
    - bin/pipenv run ansible-lint site.yml
  stage: test
